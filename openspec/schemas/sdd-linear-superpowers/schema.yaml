name: sdd-linear-superpowers
version: 5
description: >
  Spec-driven workflow with Superpowers skills and Linear lifecycle.
  Requires: Superpowers plugin (writing-plans, subagent-driven-development,
  finishing-a-development-branch),
  Claude Code with subagent support (no executing-plans fallback — loses TDD + code review).
  Linear hooks are best-effort — unavailability is non-blocking; skip silently.
  Linear owns the business "what"; the repo owns the technical "how".
  Linear spec mirroring is summary-first; full document mirroring is opt-in.
  Pipeline: proposal → specs → design → tasks → plan → apply → verify → retrospective → archive.
  Version 5 cuts default ceremony: conditional grill/full design/full retro,
  bounded plans, optional separate evidence, and archive gates.

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal bound to a Linear story
    template: proposal.md
    instruction: |
      ## Linear Setup

      Use Linear MCP tools when available. Skip silently if unavailable.

      1. **Load or create `openspec/linear.yaml`**:
         - If missing, run setup one question at a time (never auto-select):
           a. `list_teams` → ask which team, wait.
           b. `list_projects` for that team → ask which project, wait.
           c. `list_issue_labels` → ask if label filter; offer "no filter" explicitly, wait.
           d. Write `openspec/linear.yaml`.

      2. **Bind a Linear story**:
         - `list_issues` filtered to configured project/label, status Backlog.
         - Present list; ask user which issue. Wait for selection.
         - Read issue title, description, labels, comments for business context.
         - Do NOT invent goals not present in the issue.

      3. **Grill gate**:
         Invoke **grill-with-docs** only when any trigger is present:
         - ambiguous or overloaded domain terms
         - contradiction between Linear issue, docs, or code
         - new capability boundary or hard-to-reverse decision
         - user explicitly asks to stress-test the work

         If no trigger is present, write in proposal.md:
         `Grill: skipped — no domain ambiguity or hard-to-reverse decision`.
         If invoked, do NOT write proposal.md until grill reaches shared understanding.

      ## Proposal Content

      Read `documentation/REQUIREMENTS.md` — verify alignment, reference story IDs
      (NAV-1, CHAT-3) in What Changes/Impact, identify satisfied acceptance criteria.

      Write proposal.md per template. Keep 1-2 pages. "Why" drawn from the issue only.
      Capabilities section is the contract with the specs phase — research
      `openspec/specs/` before filling it in. Implementation details belong in design.md.

      ## Linear Post-Write

      When MCP available: sync business-facing sections (Why, What Changes, Impact)
      to the issue description (no frontmatter, no technical detail). Transition to
      Todo. Comment: "Proposal written. OpenSpec change `<change-name>` created."
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Delta specifications per capability
    template: spec.md
    instruction: >
      Create one spec file per capability in the proposal's Capabilities section.
      Use delta sections (ADDED / MODIFIED / REMOVED / RENAMED).

      MODIFIED: copy the FULL existing requirement block from
      openspec/specs/<capability>/spec.md and paste under ## MODIFIED with edits.
      Partial content loses detail at archive.

      Format rules (validated by OpenSpec):
      - Requirements must contain SHALL or MUST
      - Every requirement needs ≥1 scenario using exactly `####` (4 hashtags — 3 fails silently)
      - Scenarios use WHEN/THEN format
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document
    template: design.md
    instruction: >
      Before writing, read:
      - `documentation/DESIGN.md` — design tokens, component specs, do/don't rules.
        All decisions must conform.
      - `documentation/ARCHITECTURE.md` — file structure, data layer, CI pipeline.
        Decisions must align or explicitly supersede with rationale.

      Write from scratch using proposal.md for motivation.

      Use compact design by default:
      - If there is no cross-cutting change, external dependency, security/perf
        complexity, migration, or architectural ambiguity, write:
        `Design: N/A — straightforward implementation; use existing patterns.`
      - Otherwise write full design sections, capped at the decisions that
        remove real ambiguity.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist
    template: tasks.md
    instruction: >
      Break down implementation into grouped checkbox tasks. Order by dependency.
      Reference specs for what, design for how.

      Allowed task states:
      - `- [ ] X.Y desc` pending
      - `- [x] X.Y desc` complete
      - `- [~] X.Y desc — deferred: <reason>; verify impact: <blocking|non-blocking>`

      Use `[~]` only when the task is intentionally deferred, not forgotten.
      Verify must explain every `[~]` row.
    requires:
      - specs
      - design

  - id: plan
    generates: plan.md
    description: Bounded implementation plan using Superpowers writing-plans
    template: plan.md
    instruction: |
      PRECHECK: Confirm `superpowers:writing-plans` is in your available skills.
      If missing, STOP — do not silently fall back.

      Invoke **superpowers:writing-plans**. Write output to this change's `plan.md`
      (NOT `docs/superpowers/plans/`).

      Schema overrides for this invocation:
      - Treat proposal.md, specs/, design.md, tasks.md as upstream context — do NOT restate them.
      - Default to task-level execution steps.
      - Expand to 2-5 min RED/GREEN/REFACTOR micro-steps only for: risky/ambiguous tasks,
        new dependencies/test infra, tasks touching 3+ files, data/security/perf/migration.
        Each expanded task must state its risk reason.
      - Each task: compact context packet (change name, task ID, req/scenario names,
        design decision IDs if relevant, expected files, acceptance checks, test commands,
        commit point).
      - Code snippets only when novel, risky, or not obvious from file + acceptance checks.
      - For small changes, plan may say evidence is captured in verify.md.
      - For multi-task/subagent/long-running changes, plan must mention that
        apply will maintain implementation-evidence.md.

      Post-write gate — revise plan.md immediately if any fail:
      - No large chunks duplicated from proposal/specs/design
      - No micro-step expansion without an explicit risk reason
      - Simple styling/copy/component tasks stay compact
      - Each task identifies files, req/scenario, test commands, commit point
      - Full-file code blocks appear only for novel/risky code or new files
    requires:
      - tasks

  - id: verify
    generates: verify.md
    description: Post-implementation verification against specs, design, and tasks
    template: verify.md
    instruction: |
      PRECHECK — both must return > 0. If either is 0, STOP.

      1. git log --oneline $(git merge-base HEAD origin/main 2>/dev/null || git merge-base HEAD origin/master 2>/dev/null)..HEAD | wc -l
      2. grep -c '^- \[x\]' openspec/changes/<change-name>/tasks.md

      Invoke **openspec-verify-change**. Produce verify.md per template.
      Re-run until Overall Decision is PASS or PASS WITH WARNINGS.

      Timing: verify runs AFTER apply completes.

      Schema checks to include:
      - Evidence table in verify.md maps tasks to commits/files/tests.
        If implementation-evidence.md exists, summarize it; if absent, embed
        the evidence table directly in verify.md.
      - `[~]` deferred tasks have reason and verify impact.
      - Design/task reconciliation: any design mitigation that was not executed
        is either implemented, removed from design, or recorded as `[~]`.
      - Plan/task sync: completed tasks have completed matching plan steps or a
        short explanation.

      Fallback if skill unavailable: run the checks listed in verify.md template manually.
    requires:
      - apply

  - id: retrospective
    generates: retrospective.md
    description: Evidence-first retrospective of completed change
    template: retrospective.md
    instruction: |
      PRECHECK — both must pass. If either fails, STOP.

      1. test -f openspec/changes/<change-name>/verify.md
      2. ! grep -q '^- \[x\] ❌ FAIL' openspec/changes/<change-name>/verify.md

      Timing: after apply + verify pass — not during planning.

      Full retrospective triggers:
      - verify has warnings or failures that were fixed
      - skipped/deferred tasks or skipped skills
      - plan deviations, reviewer disagreement, or implementation surprises
      - new dependencies, migrations, security/perf/data concerns
      - user explicitly asks for full retro

      If no trigger is present, write a one-line retrospective:
      `Skipped: clean small change, no workflow learnings. Evidence in verify.md.`

      If triggered, write full retrospective per template.

      Forward-pointer policy: if facts change after writing, do NOT rewrite — add:
      `> **Update YYYY-MM-DD**: section X superseded by <link>`.
      Rewriting removes the audit trail of what was known at write time.
    requires:
      - verify

  - id: archive
    generates: "archive/YYYY-MM-DD-<change-name>/"
    description: Archive a verified change and complete external handoff
    instruction: |
      PRECHECK — all must pass. If any fails, STOP.

      1. test -f openspec/changes/<change-name>/verify.md
      2. test -f openspec/changes/<change-name>/retrospective.md
      3. verify.md Overall Decision is PASS or PASS WITH WARNINGS
      4. tasks.md has no `- [ ]`; `[~]` rows are allowed only if verify marks
         them non-blocking or explicitly accepted
      5. plan/task/evidence gaps from verify are resolved or marked warnings

      Run `openspec archive -y` (or `/opsx:archive`).

      Linear post-archive (best effort, skip silently if MCP unavailable;
      run ONLY after archive succeeds):
      - Add a summary comment with archive path, changed capabilities, and
        verify decision.
      - Mirror full specs to Linear Project Documents only when
        `openspec/linear.yaml` has `sync_full_specs: true`. If enabled,
        `list_documents` then `save_document` per archived capability, title
        `OpenSpec: <capability-name>`. Update existing docs — no duplicates.
        Persist doc IDs in `openspec/linear.yaml` under `spec_documents`.
      - `save_issue` → Done.
      - Comment: "Implementation complete and archived." If full spec sync
        ran, append "Specs mirrored to Linear Project Documents."

      PR / merge handoff:
      - Invoke **superpowers:finishing-a-development-branch** after archive.
      - Branch diff MUST contain complete archived cycle.
      - If retrospective or archive was skipped, STOP and complete first.
    requires:
      - retrospective

apply:
  requires:
    - plan
  tracks: tasks.md
  instruction: |
    0. **Pre-flight**:
       Confirm `superpowers:subagent-driven-development` exists when the plan is
       multi-task, risky, review-batched, or explicitly calls for subagents.

       Scan plan.md for CLI tools (npm, docker, gh, etc.). Surface missing tools as
       WARNING (not STOP) — list once at apply start.

       Before editing, inspect the current checkout status and avoid overwriting
       unrelated user changes.

    0b. **Linear** (best effort, skip silently if MCP unavailable):
        Read `linear_story_id` from proposal.md frontmatter. `save_issue` → In Progress.
        Comment: "Implementation started. Working through
        `openspec/changes/<change-name>/tasks.md`."

    1. **Execute**:
       Small-change fast path — use the main agent when all are true:
       - touches <=2 implementation files
       - no new dependency, test infra, data/security/perf/migration change
       - no ambiguous design or capability boundary
       - no plan instruction requiring subagents

       For all other changes, invoke **superpowers:subagent-driven-development**.
       Schema overrides:
       - Compact context packets per subagent (change name, task ID, req/scenario names,
         design decision IDs if relevant, expected files, acceptance checks, commands,
         current commit range).
       - Read full artifacts once as controller context; escalate to full text only
         when ambiguity requires it.
       - Maintain separate `implementation-evidence.md` only for multi-task,
         multi-commit, subagent-heavy, long-running, or review-batched changes.
       - Sync tasks.md and plan.md checkboxes as work completes.
       - Batch reviews only for consecutive mechanical tasks (styling, copy, simple
         component edits) touching the same req/file area. Record batch reason in
         implementation-evidence.md.
       - Per-task review for: behavior changes, new deps/test infra,
         data/security/perf/migration, tasks touching 3+ files, DONE_WITH_CONCERNS.

       TDD and code-review activate transitively for subagent-driven work; for the
       small-change fast path, perform equivalent RED/GREEN and review checks in
       the main agent.

    2. **Stop point**:
       Apply is complete when implementation is done, required tests/checks pass,
       and tasks.md / plan.md checkboxes are synced.

       Do not verify, write retrospective, archive, update Linear to Done, or run
       PR / merge handoff during apply. Those are handled by the standalone
       verify, retrospective, and archive steps.

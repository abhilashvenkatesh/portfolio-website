<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Abhilash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portfolio.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shared.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function ContactPage() {
  const contacts = [
    {
      label: "Email", value: "abhilashfeb30@gmail.com", href: "mailto:abhilashfeb30@gmail.com",
      desc: "Best for work enquiries and opportunities",
      icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 9l10 6 10-6"/></svg>
    },
    {
      label: "LinkedIn", value: "linkedin.com/in/abhilash93", href: "https://linkedin.com/in/abhilash93",
      desc: "Professional history and recommendations",
      icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
    },
    {
      label: "Phone", value: "+61 484 192 055", href: "tel:+61484192055",
      desc: "Melbourne, VIC, Australia (AEST/AEDT)",
      icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
    }
  ];

  return (
    <>
      <PageHeader title="Get in touch" subtitle="Let's work together" />
      <div className="page-content" style={{ paddingTop: "40px" }}>
        <div style={{ maxWidth: "640px", margin: "0 auto" }}>
          <FadeIn>
            <p style={{ color: "var(--muted)", fontSize: "17px", lineHeight: 1.75, textAlign: "center", marginBottom: "56px" }}>
              I'm currently open to full-time roles and select consulting engagements.
              If you're building something interesting, I'd love to hear about it.
            </p>
          </FadeIn>

          <div style={{ display: "flex", flexDirection: "column", gap: "14px" }}>
            {contacts.map((item, i) => (
              <FadeIn key={item.label} delay={i * 60}>
                <a href={item.href} style={{
                  display: "flex", alignItems: "center", gap: "20px",
                  padding: "20px 24px", borderRadius: "12px",
                  border: "1px solid var(--border)", textDecoration: "none",
                  background: "var(--bg2)", transition: "border-color 0.2s, background 0.2s, transform 0.2s"
                }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--accent-border)"; e.currentTarget.style.background = "var(--accent-dim)"; e.currentTarget.style.transform = "translateY(-2px)"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.background = "var(--bg2)"; e.currentTarget.style.transform = "translateY(0)"; }}
                >
                  <div style={{
                    width: "44px", height: "44px", borderRadius: "10px",
                    background: "var(--accent-dim)", border: "1px solid var(--accent-border)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    color: "var(--accent)", flexShrink: 0
                  }}>{item.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: "var(--mono)", fontSize: "11px", color: "var(--accent)", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: "3px" }}>{item.label}</div>
                    <div style={{ fontSize: "15px", color: "var(--heading)", fontWeight: 500, marginBottom: "2px" }}>{item.value}</div>
                    <div style={{ fontSize: "13px", color: "var(--muted)" }}>{item.desc}</div>
                  </div>
                  <svg style={{ color: "var(--muted)", flexShrink: 0 }} width="14" height="14" viewBox="0 0 12 12" fill="none">
                    <path d="M2 10l8-8M4 2h6v6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </a>
              </FadeIn>
            ))}
          </div>

          {/* Availability note */}
          <FadeIn delay={240}>
            <div style={{
              marginTop: "40px", padding: "20px 24px", borderRadius: "10px",
              background: "var(--accent-dim)", border: "1px solid var(--accent-border)",
              display: "flex", alignItems: "center", gap: "12px"
            }}>
              <span style={{ width: "8px", height: "8px", borderRadius: "50%", background: "var(--accent)", display: "inline-block", flexShrink: 0, boxShadow: "0 0 0 3px var(--accent-dim)" }}></span>
              <p style={{ fontSize: "14px", color: "var(--accent)", fontFamily: "var(--mono)" }}>
                Currently available — open to full-time and contract roles starting immediately.
              </p>
            </div>
          </FadeIn>
        </div>
      </div>
    </>
  );
}

function App() {
  const [isDark, toggleTheme] = useTheme();
  return (
    <>
      <Nav active="contact" isDark={isDark} onToggleTheme={toggleTheme} />
      <main><ContactPage /></main>
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

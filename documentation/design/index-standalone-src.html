<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abhilash — Backend &amp; Product Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portfolio.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shared.js"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#f6f3ee">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#f6f3ee"/>
    <text x="600" y="380" text-anchor="middle" font-family="ui-monospace, monospace" font-size="48" fill="#c8693a" letter-spacing="6">abhilash</text>
    <rect x="400" y="430" width="400" height="60" rx="14" fill="none" stroke="#d9c9b3" stroke-width="2"/>
    <circle cx="760" cy="460" r="18" fill="#c8693a"/>
    <text x="600" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#7a6f60">loading…</text>
  </svg>
</template>
<div id="root"></div>
<script type="text/babel">

const SUGGESTIONS = [
  "What are Abhilash's top skills?",
  "Tell me about his role at Rapido",
  "Which projects has he led?",
  "How can I get in touch?"
];

function ChatLauncher() {
  const [value, setValue] = React.useState("");
  const go = (q) => {
    if (!q.trim()) return;
    window.location.href = `chat.html?q=${encodeURIComponent(q.trim())}`;
  };
  return (
    <div style={{ width: "100%", maxWidth: "620px", margin: "0 auto" }}>
      <form onSubmit={e => { e.preventDefault(); go(value); }} style={{
        display: "flex", alignItems: "center", gap: "8px",
        background: "var(--bg2)", border: "1px solid var(--border)",
        borderRadius: "14px", padding: "8px 8px 8px 18px",
        boxShadow: "var(--shadow)", transition: "border-color 0.2s"
      }}
        onFocus={e => e.currentTarget.style.borderColor = "var(--accent-border)"}
        onBlur={e => e.currentTarget.style.borderColor = "var(--border)"}
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <input
          value={value} onChange={e => setValue(e.target.value)}
          placeholder="Ask me anything about Abhilash…"
          style={{
            flex: 1, background: "transparent", border: "none", outline: "none",
            fontFamily: "var(--font)", fontSize: "15px", color: "var(--text)",
            padding: "12px 4px"
          }}
        />
        <button type="submit" style={{
          display: "inline-flex", alignItems: "center", justifyContent: "center",
          width: "40px", height: "40px", borderRadius: "10px",
          background: "var(--accent)", color: "#fff", border: "none",
          cursor: "pointer", flexShrink: 0
        }}
          onMouseEnter={e => e.currentTarget.style.opacity = "0.85"}
          onMouseLeave={e => e.currentTarget.style.opacity = "1"}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </button>
      </form>

      <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", justifyContent: "center", marginTop: "16px" }}>
        {SUGGESTIONS.map(s => (
          <button key={s} onClick={() => go(s)} style={{
            fontFamily: "var(--mono)", fontSize: "12px",
            padding: "7px 14px", borderRadius: "100px",
            border: "1px solid var(--border)", background: "transparent",
            color: "var(--muted)", cursor: "pointer", transition: "all 0.2s"
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--accent-border)"; e.currentTarget.style.color = "var(--accent)"; e.currentTarget.style.background = "var(--accent-dim)"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.color = "var(--muted)"; e.currentTarget.style.background = "transparent"; }}
          >{s}</button>
        ))}
      </div>
      <div style={{ marginTop: "14px", fontFamily: "var(--mono)", fontSize: "11px", color: "var(--muted)", letterSpacing: "0.06em" }}>
        or browse · <a href="projects.html" style={{color:"var(--accent)",textDecoration:"none"}}>projects</a> · <a href="experience.html" style={{color:"var(--accent)",textDecoration:"none"}}>experience</a> · <a href="contact.html" style={{color:"var(--accent)",textDecoration:"none"}}>contact</a>
      </div>
    </div>
  );
}

function Hero() {
  return (
    <section style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      justifyContent: "center", alignItems: "center", textAlign: "center",
      padding: "120px clamp(20px, 5vw, 64px) 80px",
      position: "relative", overflow: "hidden"
    }}>
      <div style={{
        position: "absolute", inset: 0, zIndex: 0, pointerEvents: "none",
        backgroundImage: `linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px)`,
        backgroundSize: "60px 60px",
        maskImage: "radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 100%)"
      }}></div>
      <div style={{
        position: "absolute", top: "20%", left: "50%", transform: "translateX(-50%)",
        width: "500px", height: "400px",
        background: "oklch(0.58 0.18 38 / 0.08)",
        borderRadius: "50%", filter: "blur(80px)", zIndex: 0, pointerEvents: "none"
      }}></div>

      <div style={{ position: "relative", zIndex: 1, maxWidth: "760px" }}>
        <div style={{ marginBottom: "24px" }}>
          <AccentTag label="Lead Application Developer · Melbourne" />
        </div>
        <h1 style={{
          fontSize: "clamp(48px, 7vw, 88px)", fontWeight: 600,
          lineHeight: 1.05, letterSpacing: "-0.03em", marginBottom: "24px", color: "var(--heading)"
        }}>
          Hi, I'm Abhilash.<br />
          <span style={{ color: "var(--muted)", fontWeight: 300 }}>I architect systems</span><br />
          <span style={{ color: "var(--muted)", fontWeight: 300 }}>that <em style={{ color: "var(--accent)", fontStyle: "normal" }}>scale to millions.</em></span>
        </h1>
        <p style={{
          fontSize: "clamp(16px, 2vw, 19px)", color: "var(--muted)",
          maxWidth: "520px", lineHeight: 1.7, fontWeight: 300, margin: "0 auto 40px"
        }}>
          Lead Application Developer with 11+ years building distributed systems, cloud infrastructure,
          and engineering teams across Australia and India. Currently at Fabric Group, Melbourne.
        </p>
        <ChatLauncher />

        <div style={{ display: "flex", gap: "40px", marginTop: "72px", flexWrap: "wrap", justifyContent: "center" }}>
          {[
            { n: "11+", label: "years experience" },
            { n: "30+", label: "microservices shipped" },
            { n: "3",   label: "countries worked in" }
          ].map(s => (
            <div key={s.n}>
              <div style={{ fontSize: "28px", fontWeight: 600, color: "var(--heading)", letterSpacing: "-0.02em" }}>{s.n}</div>
              <div style={{ fontSize: "13px", color: "var(--muted)", fontFamily: "var(--mono)" }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{
        position: "absolute", bottom: "32px", left: "50%", transform: "translateX(-50%)",
        display: "flex", flexDirection: "column", alignItems: "center", gap: "6px", opacity: 0.35
      }}>
        <span style={{ fontSize: "11px", fontFamily: "var(--mono)", letterSpacing: "0.08em", color: "var(--muted)" }}>scroll</span>
        <svg width="12" height="20" viewBox="0 0 12 20" fill="none">
          <rect x="0.75" y="0.75" width="10.5" height="18.5" rx="5.25" stroke="currentColor" strokeWidth="1.5"/>
          <circle cx="6" cy="6" r="1.5" fill="currentColor">
            <animate attributeName="cy" values="6;12;6" dur="1.8s" repeatCount="indefinite"/>
          </circle>
        </svg>
      </div>
    </section>
  );
}

function App() {
  const [isDark, toggleTheme] = useTheme();
  return (
    <>
      <Nav active="home" isDark={isDark} onToggleTheme={toggleTheme} />
      <main style={{ paddingTop: 0 }}>
        <Hero />
      </main>
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — Abhilash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portfolio.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shared.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function AboutPage() {
  return (
    <>
      <PageHeader title="About me" subtitle={<>11+ years building systems<br/><span style={{color:"var(--muted)",fontWeight:300}}>across 3 countries and 4 industries.</span></>} />
      <div className="page-content" style={{ paddingTop: "40px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: "80px", alignItems: "start", maxWidth: "860px", margin: "0 auto" }}>
          <FadeIn>
            <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>
              {[
                "I'm a Lead Application Developer based in Melbourne, Australia. Over 11+ years I've worked across insurance, logistics, mobility, and retail — building distributed systems and cloud infrastructure that power products at scale.",
                "My work has spanned ThoughtWorks, Rapido (India's largest bike-taxi platform), Australia Post, and now Fabric Group — where I lead a team of 6 engineers delivering AWS serverless platforms for enterprise clients.",
                "I care most about the decisions that are hard to undo: system architecture, data modelling, team structure. I like working on problems where the blast radius of a wrong call is measured in millions of users."
              ].map((p, i) => (
                <p key={i} style={{ color: "var(--muted)", fontSize: "17px", lineHeight: 1.8 }}>{p}</p>
              ))}
            </div>

            <div style={{ display: "flex", gap: "16px", flexWrap: "wrap", marginTop: "36px" }}>
              <a href="#" style={{
                display: "inline-flex", alignItems: "center", gap: "8px",
                padding: "10px 20px", borderRadius: "8px",
                background: "var(--accent)", color: "#000",
                fontSize: "13px", fontWeight: 600, textDecoration: "none", fontFamily: "var(--mono)"
              }}
                onMouseEnter={e => e.currentTarget.style.opacity = "0.85"}
                onMouseLeave={e => e.currentTarget.style.opacity = "1"}
              >
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
                </svg>
                Download résumé
              </a>
              <a href="#" style={{
                display: "inline-flex", alignItems: "center", gap: "8px",
                padding: "10px 20px", borderRadius: "8px",
                border: "1px solid var(--border)", color: "var(--muted)",
                fontSize: "13px", textDecoration: "none", fontFamily: "var(--mono)"
              }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--accent-border)"; e.currentTarget.style.color = "var(--accent)"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.color = "var(--muted)"; }}
              href="blog.html">Blog →</a>
            </div>
          </FadeIn>

          {/* Avatar */}
          <FadeIn delay={100}>
            <div style={{
              width: "200px", height: "200px", borderRadius: "14px",
              border: "1px solid var(--border)", background: "var(--bg2)",
              display: "flex", alignItems: "center", justifyContent: "center",
              flexDirection: "column", gap: "8px", flexShrink: 0
            }}>
              <svg width="56" height="56" viewBox="0 0 48 48" fill="none">
                <circle cx="24" cy="18" r="10" stroke="var(--border)" strokeWidth="1.5"/>
                <path d="M4 44c0-11 9-19 20-19s20 8 20 19" stroke="var(--border)" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
              <span style={{ fontSize: "11px", fontFamily: "var(--mono)", color: "var(--bg3)" }}>photo</span>
            </div>
          </FadeIn>
        </div>

        {/* Skills section on About */}
        <div style={{ maxWidth: "860px", margin: "80px auto 0" }}>
          <FadeIn>
            <SectionLabel>What I work with</SectionLabel>
          </FadeIn>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: "16px" }}>
            {Object.entries(SKILLS).map(([group, items], gi) => (
              <FadeIn key={group} delay={gi * 60}>
                <div style={{ padding: "20px", borderRadius: "10px", background: "var(--bg2)", border: "1px solid var(--border)" }}>
                  <div style={{ fontFamily: "var(--mono)", fontSize: "11px", color: "var(--accent)", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "12px" }}>{group}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                    {items.map(s => (
                      <span key={s} style={{ fontSize: "12px", color: "var(--muted)", padding: "3px 8px", borderRadius: "4px", background: "var(--bg3)", border: "1px solid var(--border)" }}>{s}</span>
                    ))}
                  </div>
                </div>
              </FadeIn>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

function App() {
  const [isDark, toggleTheme] = useTheme();
  return (
    <>
      <Nav active="about" isDark={isDark} onToggleTheme={toggleTheme} />
      <main><AboutPage /></main>
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
